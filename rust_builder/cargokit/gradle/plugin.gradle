/// This is copied from Cargokit (which is the official way to use it currently)
/// Details: https://fzyzcjy.github.io/flutter_rust_bridge/manual/integrate/builtin

import java.nio.file.Paths
import org.apache.tools.ant.taskdefs.condition.Os

CargoKitPlugin.file = buildscript.sourceFile

apply plugin: CargoKitPlugin

class CargoKitExtension {
    String manifestDir; // Relative path to folder containing Cargo.toml
    String libname; // Library name within Cargo.toml. Must be a cdylib
}

abstract class CargoKitBuildTask extends DefaultTask {

    @Input
    String buildMode

    @Input
    String buildDir

    @Input
    String outputDir

    @Input
    String ndkVersion

    @Input
    String sdkDirectory

    @Input
    int compileSdkVersion;

    @Input
    int minSdkVersion;

    @Input
    String pluginFile

    @Input
    List<String> targetPlatforms

    @TaskAction
    def build() {
        if (project.cargokit.manifestDir == null) {
            throw new GradleException("Property 'manifestDir' must be set on cargokit extension");
        }

        if (project.cargokit.libname == null) {
            throw new GradleException("Property 'libname' must be set on cargokit extension");
        }

        def executableName = Os.isFamily(Os.FAMILY_WINDOWS) ? "run_build_tool.cmd" : "run_build_tool.sh"
        def path = Paths.get(new File(pluginFile).parent, "..", executableName);

        def manifestDir = Paths.get(project.buildscript.sourceFile.parent, project.cargokit.manifestDir)

        def rootProjectDir = project.rootProject.projectDir
        def localProperties = new Properties()
        def localPropertiesFile = new File(rootProjectDir, "local.properties")
        if (localPropertiesFile.exists()) {
            localPropertiesFile.withInputStream { stream ->
                localProperties.load(stream)
            }
        }
        def flutterRoot = localProperties.getProperty("flutter.sdk")
        
        if (!Os.isFamily(Os.FAMILY_WINDOWS)) {
            project.exec {
                commandLine 'chmod', '+x', path
            }
        }
        
        project.exec {
            executable path
            args "build-gradle"
            environment "CARGOKIT_ROOT_PROJECT_DIR", rootProjectDir
            environment "CARGOKIT_TOOL_TEMP_DIR", "${buildDir}/build_tool"
            environment "CARGOKIT_MANIFEST_DIR", manifestDir
            environment "CARGOKIT_CONFIGURATION", buildMode
            environment "CARGOKIT_TARGET_TEMP_DIR", buildDir
            environment "CARGOKIT_OUTPUT_DIR", outputDir
            environment "CARGOKIT_NDK_VERSION", ndkVersion
            environment "CARGOKIT_SDK_DIR", sdkDirectory
            environment "CARGOKIT_COMPILE_SDK_VERSION", compileSdkVersion
            environment "CARGOKIT_MIN_SDK_VERSION", minSdkVersion
            environment "CARGOKIT_TARGET_PLATFORMS", targetPlatforms.join(",")
            environment "CARGOKIT_JAVA_HOME", System.properties['java.home']
            if (flutterRoot != null && !flutterRoot.trim().isEmpty()) {
                environment "FLUTTER_ROOT", flutterRoot
            }
        }
    }
}

class CargoKitPlugin implements Plugin<Project> {

    static String file;

    private static final Map<String, String> ABI_TO_TARGET = [
        "armeabi-v7a": "android-arm",
        "arm64-v8a"  : "android-arm64",
        "x86"        : "android-x86",
        "x86_64"     : "android-x64",
    ]

    private static final List<String> DEFAULT_TARGET_PLATFORMS = [
        "android-arm",
        "android-arm64",
        "android-x64",
    ]

    private boolean parseTruthy(def value) {
        if (value == null) {
            return false
        }
        def normalized = value.toString().trim().toLowerCase()
        return normalized in ["1", "true", "yes", "on"]
    }

    private boolean shouldUsePrebuiltAndroidRust(Project flutterAppProject) {
        def propertyValue = flutterAppProject.rootProject.findProperty("vnt.usePrebuiltRustAndroid")
        def envValue = System.getenv("VNT_USE_PREBUILT_RUST_ANDROID")
        return parseTruthy(propertyValue) || parseTruthy(envValue)
    }

    private Project findFlutterAppProject(Project rootProject) {
        def appProject = rootProject.findProject(":app")
        if (appProject != null) {
            return appProject
        }
        return _findFlutterAppProject(rootProject.childProjects)
    }

    private Project _findFlutterAppProject(Map projects) {
        for (project in projects) {
            def candidate = project.value
            if (candidate.plugins.hasPlugin("com.android.application")) {
                return candidate
            }
            def nested = _findFlutterAppProject(candidate.childProjects)
            if (nested != null) {
                return nested
            }
        }
        return null
    }

    private int parseCompileSdkVersion(def compileSdkVersion) {
        if (compileSdkVersion == null) {
            return 36
        }
        def value = compileSdkVersion.toString()
        if (value.startsWith("android-")) {
            return value.substring(8) as int
        }
        return value as int
    }

    private List<String> resolveTargetPlatforms(Project flutterAppProject, String buildType) {
        def platforms = []
        def abiFilters = flutterAppProject.android.defaultConfig.ndk?.abiFilters
        abiFilters?.each { abi ->
            def target = ABI_TO_TARGET[abi?.toString()]
            if (target != null && !platforms.contains(target)) {
                platforms.add(target)
            }
        }
        if (platforms.isEmpty()) {
            def platformsProperty = flutterAppProject.findProperty("target-platform")?.toString()
            if (platformsProperty != null && !platformsProperty.trim().isEmpty()) {
                platformsProperty.split(",")
                    .collect { it.trim() }
                    .findAll { !it.isEmpty() }
                    .each { platform ->
                        if (!DEFAULT_TARGET_PLATFORMS.contains(platform) && platform != "android-x86") {
                            throw new GradleException("Invalid platform: ${platform}")
                        }
                        if (!platforms.contains(platform)) {
                            platforms.add(platform)
                        }
                    }
            }
        }
        if (platforms.isEmpty()) {
            platforms.addAll(DEFAULT_TARGET_PLATFORMS)
        }
        if (buildType == "debug" && !platforms.contains("android-x86")) {
            platforms.add("android-x86")
        }
        return platforms
    }

    @Override
    void apply(Project project) {
        project.extensions.create("cargokit", CargoKitExtension)

        def flutterAppProject = findFlutterAppProject(project.rootProject)
        if (flutterAppProject == null) {
            print("Flutter app project not found, CargoKit plugin will not be applied.")
            return;
        }

        def configured = false
        flutterAppProject.plugins.withId("dev.flutter.flutter-gradle-plugin") {
            configured = true
            def cargoBuildDir = "${project.buildDir}/build"

            flutterAppProject.android.applicationVariants.all { variant ->
                final buildType = variant.buildType.name
                def cargoOutputDir = "${project.buildDir}/jniLibs/${buildType}"
                def jniLibs = project.android.sourceSets.maybeCreate(buildType).jniLibs
                jniLibs.srcDir(new File(cargoOutputDir))

                project.afterEvaluate {
                    if (shouldUsePrebuiltAndroidRust(flutterAppProject)) {
                        println("CargoKit: 检测到预编译 Android Rust 库开关，跳过 ${buildType} 变体的 Rust 重编。")
                        return
                    }

                    def taskName = "cargokitCargoBuild${project.cargokit.libname.capitalize()}${buildType.capitalize()}"
                    if (project.tasks.findByName(taskName)) {
                        return
                    }

                    if (flutterAppProject.android.ndkVersion == null) {
                        throw new GradleException("Please set 'android.ndkVersion' in 'app/build.gradle'.")
                    }

                    def task = project.tasks.create(taskName, CargoKitBuildTask.class) {
                        buildMode = buildType
                        buildDir = cargoBuildDir
                        outputDir = cargoOutputDir
                        ndkVersion = flutterAppProject.android.ndkVersion
                        sdkDirectory = flutterAppProject.android.sdkDirectory
                        minSdkVersion = flutterAppProject.android.defaultConfig.minSdkVersion.apiLevel as int
                        compileSdkVersion = parseCompileSdkVersion(flutterAppProject.android.compileSdkVersion)
                        targetPlatforms = resolveTargetPlatforms(flutterAppProject, buildType)
                        pluginFile = CargoKitPlugin.file
                    }

                    def mergeTaskName = "merge${buildType.capitalize()}NativeLibs"
                    def onTask = { newTask ->
                        if (newTask.name == mergeTaskName) {
                            newTask.dependsOn task
                            newTask.outputs.upToDateWhen { false }
                        }
                    }
                    project.tasks.each onTask
                    project.tasks.whenTaskAdded(onTask)
                }
            }
        }

        project.gradle.projectsEvaluated {
            if (!configured) {
                print("Flutter plugin not found, CargoKit plugin will not be applied.")
            }
        }
    }
}
